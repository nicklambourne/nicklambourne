<text x="20.0" y="294.0" font-size="14" xml:space="preserve"><tspan fill="#c9d1d9">Engineering Manager (AI) at Canva. I founded and lead the Evaluation</tspan></text>
<text x="20.0" y="314.0" font-size="14" xml:space="preserve"><tspan fill="#c9d1d9">Platform team — the tooling Canva uses to judge its generative AI,</tspan></text>
<text x="20.0" y="334.0" font-size="14" xml:space="preserve"><tspan fill="#c9d1d9">including a head-to-head &quot;arena&quot; across text, image, video, audio and 3D.</tspan></text>
<text x="20.0" y="354.0" font-size="14" xml:space="preserve"><tspan fill="#c9d1d9">Bringing the ergonomics of pytest to non-deterministic AI.</tspan></text>
