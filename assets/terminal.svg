<text x="20.0" y="400.0" font-size="14" xml:space="preserve"><tspan fill="#c9d1d9">- Senior ML Engineer at Canva building out the ML platform, and a</tspan></text>
<text x="20.0" y="420.0" font-size="14" xml:space="preserve"><tspan fill="#c9d1d9">  software-engineering intern before that.</tspan></text>
<text x="20.0" y="440.0" font-size="14" xml:space="preserve"><tspan fill="#c9d1d9">- Research engineer at UQ, where I architected Elpis.</tspan></text>
<text x="20.0" y="460.0" font-size="14" xml:space="preserve"><tspan fill="#c9d1d9">- SRE intern at Atlassian (SLO reporting).</tspan></text>
<text x="20.0" y="480.0" font-size="14" xml:space="preserve"><tspan fill="#c9d1d9">- Studied at UQ: Computer Science (thesis: Quantum Finite Automata),</tspan></text>
